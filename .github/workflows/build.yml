name: Build application
on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'vite.config.js'
      - 'tailwind.config.js'
      - 'postcss.config.js'
  pull_request:
    branches: [master]
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'vite.config.js'
      - 'tailwind.config.js'
      - 'postcss.config.js'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
      - name: Cache bun packages
        id: cache-bun
        uses: actions/cache@v4
        env:
          cache-name: cache-bun-packages
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: Install dependencies
        run: bun install
      - name: Build
        run: bun run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
          retention-days: 1

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: 'eu-north-1'
      - name: Upload build to AWS S3
        # Note: --acl public-read removed - bucket is private, access via CloudFront OAC
        run: aws s3 sync build/ s3://${{ secrets.AWS_S3_BUCKET }} --follow-symlinks --delete
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --region us-east-1
      - name: Update last deployed timestamp in README
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          sed -i "s|<!-- LAST_DEPLOYED -->.*|<!-- LAST_DEPLOYED --> ${TIMESTAMP}|" README.md
      - name: Commit and push updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update last deployed timestamp [skip ci]"
          git push
